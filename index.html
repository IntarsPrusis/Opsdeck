<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1419" id="themeColor">
<title>TaskaDo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1419;
  --surface: #141a22;
  --card: #151c24;
  --card-hover: #1a222c;
  --border: rgba(255,255,255,0.035);
  --border-s: rgba(255,255,255,0.06);
  --t1: #e2e0db;
  --t2: #556575;
  --t3: #3d4a58;
  --accent: #2db496;
  --accent-h: #26a085;
  --accent-bg: rgba(45,180,150,0.08);
  --persimmon: #d85a37;
  --persimmon-bg: rgba(216,90,55,0.08);
  --gold: #c9a84c;
  --gold-bg: rgba(201,168,76,0.08);
  --sage: #7a9680;
  --sage-bg: rgba(122,150,128,0.08);
  --teal: #2db496;
  --teal-bg: rgba(45,180,150,0.06);
  --r: 12px;
  --r-lg: 14px;
  --r-sm: 8px;
}
[data-theme="light"] {
  --bg: #f5f2ec;
  --surface: #faf8f4;
  --card: #faf8f4;
  --card-hover: #f5f2ec;
  --border: rgba(0,0,0,0.04);
  --border-s: rgba(0,0,0,0.07);
  --t1: #2c2a25;
  --t2: #5c564e;
  --t3: #9a9488;
  --accent: #2d8c78;
  --accent-h: #257a68;
  --accent-bg: rgba(45,140,120,0.06);
  --persimmon: #c85230;
  --persimmon-bg: rgba(200,82,48,0.05);
  --gold: #a88a3a;
  --gold-bg: rgba(168,138,58,0.06);
  --sage: #5a7a60;
  --sage-bg: rgba(90,122,96,0.06);
  --teal: #2d8c78;
  --teal-bg: rgba(45,140,120,0.05);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); min-height: 100vh; color: var(--t1); -webkit-font-smoothing: antialiased; }
input, select, textarea, button { font-family: inherit; }

/* Layout */
.page-wrap { display: flex; min-height: 100vh; }
.sidebar { width: 200px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 150; overflow-y: auto; padding: 18px 0; }
.main-area { flex: 1; margin-left: 200px; min-width: 0; min-height: 100vh; padding: 20px 24px; }

/* Sidebar */
.sidebar-brand { display: flex; align-items: center; gap: 8px; padding: 0 14px 14px; --sync-bg: var(--accent-bg); --sync-fg: var(--t3); transition: all 0.3s; }
.sidebar-brand.connected { --sync-bg: rgba(45,180,150,0.12); --sync-fg: var(--accent); }
.sidebar-brand.syncing { --sync-bg: rgba(45,180,150,0.15); --sync-fg: var(--accent); animation: pulse-sync 1.2s ease-in-out infinite; }
.sidebar-brand.error { --sync-bg: rgba(216,90,55,0.12); --sync-fg: var(--persimmon); }
@keyframes pulse-sync { 0%,100% { opacity:1; } 50% { opacity:0.35; } }
.sidebar-brand h1 { font-size: 14px; font-weight: 600; letter-spacing: -0.3px; }
.sb-date { font-size: 9px; color: var(--t3); padding: 0 14px 12px; font-family: 'JetBrains Mono', monospace; }
.sb-divider { border-top: 1px solid var(--border); margin: 6px 14px 8px; }

/* LME */
.sb-metals { padding: 0 10px 12px; }
.sb-metals-box { background: rgba(255,255,255,0.015); border-radius: 10px; border: 1px solid var(--border); padding: 8px 10px; }
[data-theme="light"] .sb-metals-box { background: rgba(0,0,0,0.015); }
.sb-metals-h { font-size: 9px; font-weight: 500; color: var(--t3); letter-spacing: 0.3px; margin-bottom: 5px; }
.sb-metal-row { display: flex; align-items: baseline; gap: 4px; font-family: 'JetBrains Mono', monospace; margin-bottom: 2px; }
.sb-metal-sym { font-size: 9px; font-weight: 600; color: var(--accent); min-width: 16px; }
.sb-metal-val { font-size: 11px; font-weight: 500; color: var(--t1); }
.sb-pct { font-size: 8px; font-weight: 500; padding: 1px 4px; border-radius: 5px; font-family: 'JetBrains Mono', monospace; }
.sb-pct.up { color: var(--persimmon); background: var(--persimmon-bg); }
.sb-pct.down { color: var(--accent); background: var(--accent-bg); }
.sb-metals-vs { font-size: 8px; color: var(--t3); margin-top: 3px; }
.sb-metals-hint { font-size: 10px; color: var(--t3); padding: 2px 0; font-style: italic; }

/* Nav */
.sidebar-nav { display: flex; flex-direction: column; gap: 2px; padding: 0 8px; flex: 1; }
.nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; font-size: 12px; font-weight: 400; color: var(--t2); cursor: pointer; border: none; background: none; border-radius: 10px; transition: all 0.15s; text-align: left; width: 100%; font-family: inherit; letter-spacing: -0.1px; }
.nav-item:hover { color: var(--t1); background: rgba(255,255,255,0.02); }
[data-theme="light"] .nav-item:hover { background: rgba(0,0,0,0.02); }
.nav-item.active { color: var(--accent); background: var(--accent-bg); font-weight: 500; }
.nav-item .nav-icon { display: inline-flex; align-items: center; width: 18px; justify-content: center; }
.nav-badge { margin-left: auto; font-size: 9px; font-weight: 500; padding: 2px 7px; border-radius: 8px; }
.nav-item.active .nav-badge { background: rgba(45,180,150,0.1); color: var(--accent); }
.nav-soon { margin-left: auto; font-size: 8px; font-weight: 400; font-style: italic; color: var(--t3); }
.sidebar-bottom { border-top: 1px solid var(--border); padding: 8px 8px 0; margin-top: auto; }
.sidebar-bottom .nav-item { font-size: 11px; padding: 7px 10px; }

/* Mobile */
.mobile-top-bar { display: none; align-items: center; gap: 10px; padding: 14px 14px 0; }
.mob-sync-logo { display: flex; --sync-bg: var(--accent-bg); --sync-fg: var(--t3); transition: all 0.3s; }
.mob-sync-logo.connected { --sync-bg: rgba(45,180,150,0.12); --sync-fg: var(--accent); }
.mob-sync-logo.syncing { --sync-bg: rgba(45,180,150,0.15); --sync-fg: var(--accent); animation: pulse-sync 1.2s ease-in-out infinite; }
.mob-sync-logo.error { --sync-bg: rgba(216,90,55,0.12); --sync-fg: var(--persimmon); }
.mobile-top-bar .mob-brand { font-size: 16px; font-weight: 600; margin-right: auto; }
.mobile-top-bar .mob-date { font-size: 10px; color: var(--t3); font-family: 'JetBrains Mono', monospace; }
.mobile-bar { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); z-index: 150; padding: 4px 8px; }
.mobile-bar-inner { display: flex; justify-content: space-around; align-items: center; }
.mobile-nav { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 4px; border: none; background: none; color: var(--t3); cursor: pointer; font-size: 9px; font-weight: 400; font-family: inherit; min-width: 52px; }
.mobile-nav.active { color: var(--accent); }
.mobile-nav .mob-icon { display: flex; align-items: center; justify-content: center; height: 20px; }

/* Focus section */
.focus-section { margin-bottom: 20px; }
.focus-top { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.focus-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--persimmon); animation: pulse-remind 1.8s ease-in-out infinite; }
@keyframes pulse-remind { 0%,100% { opacity:1; } 50% { opacity:0.25; } }
.focus-label { font-size: 14px; font-weight: 500; color: var(--persimmon); }
.focus-card { display: flex; align-items: center; gap: 16px; padding: 16px 18px; background: var(--card); border-radius: var(--r-lg); margin-bottom: 8px; cursor: pointer; }
.focus-card:hover { background: var(--card-hover); }
.focus-days { font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono', monospace; line-height: 1; min-width: 50px; text-align: center; letter-spacing: -2px; }
.focus-days-label { font-size: 9px; font-weight: 400; margin-top: 2px; text-align: center; }
.focus-info { flex: 1; min-width: 0; }
.focus-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; letter-spacing: -0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.focus-meta { font-size: 11px; color: var(--t3); display: flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; }
.focus-ring { width: 48px; height: 48px; position: relative; flex-shrink: 0; }
.focus-ring svg { width: 48px; height: 48px; transform: rotate(-90deg); }
.focus-ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }

/* Divider */
.sec-divider { height: 1px; background: var(--border); margin: 20px 0; }

/* Section header */
.sec-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.sec-title { font-size: 13px; font-weight: 500; color: var(--t3); }
.sec-line { flex: 1; height: 1px; background: var(--border); }
.sec-count { font-size: 10px; color: var(--t3); font-family: 'JetBrains Mono', monospace; }
.sec-right { display: flex; align-items: center; gap: 6px; margin-left: auto; }

/* New ticket button */
.btn-new { padding: 7px 16px; border-radius: 10px; border: none; background: var(--accent); color: #fff; font-size: 12px; cursor: pointer; font-weight: 500; font-family: inherit; }
.btn-new:hover { background: var(--accent-h); }

/* Ticket cards */
.ticket { padding: 14px 16px; background: var(--card); border-radius: var(--r-lg); margin-bottom: 6px; cursor: pointer; }
.ticket:hover { background: var(--card-hover); }
.ticket-top { display: flex; align-items: center; gap: 12px; }
.ticket-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.ticket-title { font-size: 14px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.2px; }
.ticket-when { font-size: 12px; font-family: 'JetBrains Mono', monospace; font-weight: 500; padding: 4px 10px; border-radius: 8px; flex-shrink: 0; }
.ticket-bottom { display: flex; align-items: center; gap: 8px; margin-top: 8px; padding-left: 24px; }
.ticket-id { font-size: 10px; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
.avatar { width: 20px; height: 20px; border-radius: 7px; display: inline-flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 600; background: var(--accent-bg); color: var(--accent); flex-shrink: 0; }
.ticket-who { font-size: 11px; color: var(--t2); }
.ticket-progress { font-size: 11px; color: var(--t2); font-family: 'JetBrains Mono', monospace; }
.sep { color: var(--t3); opacity: 0.4; }
.btn-delete { background: none; border: none; color: var(--t3); cursor: pointer; font-size: 14px; opacity: 0.2; padding: 0 2px; flex-shrink: 0; }
.btn-delete:hover { color: var(--persimmon); opacity: 1; }

/* Done tickets */
.ticket-done { opacity: 0.35; }
.ticket-done .ticket-title { text-decoration: line-through; color: var(--t3); }

/* Expanded ticket */
.ticket-expanded { background: var(--card); border-radius: var(--r-lg); margin-bottom: 6px; overflow: hidden; }
.ticket-expanded .ticket-header { padding: 16px 18px; cursor: pointer; }
.ticket-expanded .ticket-header:hover { background: rgba(255,255,255,0.01); }
[data-theme="light"] .ticket-expanded .ticket-header:hover { background: rgba(0,0,0,0.01); }

/* Subtask panel */
.sub-panel { background: var(--bg); padding: 16px 18px; border-top: 1px solid var(--border); }
.sub-header { font-size: 11px; color: var(--t3); margin-bottom: 12px; font-weight: 500; }
.sub-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.sub-item:last-of-type { border-bottom: none; }
.checkbox { width: 22px; height: 22px; border-radius: 8px; border: 2px solid var(--border-s); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.checkbox:hover { border-color: var(--accent); }
.checkbox.checked { background: var(--accent); border-color: transparent; }
.sub-info { flex: 1; min-width: 0; }
.sub-title { font-size: 13px; font-weight: 500; margin-bottom: 4px; letter-spacing: -0.1px; }
.sub-title.done { text-decoration: line-through; color: var(--t3); }
.sub-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.chip { font-size: 10px; padding: 3px 8px; border-radius: 7px; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; gap: 4px; }
.chip-agent { background: var(--accent-bg); color: var(--accent); font-weight: 600; }
.chip-date { background: rgba(255,255,255,0.025); color: var(--t2); }
[data-theme="light"] .chip-date { background: rgba(0,0,0,0.03); }
.chip-warn { background: var(--gold-bg); color: var(--gold); }
.chip-done { background: var(--teal-bg); color: var(--accent); }
.sub-del { background: none; border: none; color: var(--t3); cursor: pointer; opacity: 0.2; font-size: 12px; flex-shrink: 0; margin-top: 2px; }
.sub-del:hover { color: var(--persimmon); opacity: 1; }

/* Sub detail */
.sub-detail { margin-top: 10px; padding: 12px 14px; background: rgba(255,255,255,0.015); border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
[data-theme="light"] .sub-detail { background: rgba(0,0,0,0.02); }
.dt-label { font-size: 10px; color: var(--t3); font-weight: 500; margin-bottom: 4px; }
.dt-text { font-size: 12px; color: var(--t2); line-height: 1.7; }
.dt-file { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--accent); padding: 5px 10px; background: var(--accent-bg); border-radius: 8px; text-decoration: none; margin-right: 4px; margin-bottom: 4px; }
.dt-file:hover { background: rgba(45,180,150,0.12); }
.dt-edit { font-size: 10px; color: var(--accent); background: none; border: none; cursor: pointer; font-family: inherit; }
.sub-toggle { font-size: 11px; color: var(--t3); background: none; border: none; cursor: pointer; font-family: inherit; margin-top: 6px; padding: 4px 0; display: flex; align-items: center; gap: 4px; }
.sub-toggle:hover { color: var(--accent); }
.sub-arrow { display: inline-block; transition: transform 0.2s; }
.sub-arrow.open { transform: rotate(90deg); }

/* Add subtask row */
.add-sub-row { display: flex; gap: 6px; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.add-sub-row input { flex: 1; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border-s); font-size: 12px; background: rgba(255,255,255,0.02); color: var(--t1); outline: none; }
[data-theme="light"] .add-sub-row input { background: rgba(0,0,0,0.02); }
.add-sub-row input:focus { border-color: var(--accent); }
.agent-input { max-width: 44px !important; min-width: 44px !important; text-transform: uppercase; text-align: center; font-weight: 600; letter-spacing: 0.5px; }
.add-sub-row input[type="date"] { font-family: 'JetBrains Mono', monospace; font-size: 11px; color-scheme: dark; }
[data-theme="light"] .add-sub-row input[type="date"] { color-scheme: light; }
.btn-add { padding: 8px 14px; border-radius: 10px; border: none; background: var(--accent); color: #fff; font-size: 12px; cursor: pointer; font-weight: 500; }
.btn-cancel { padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border-s); background: var(--surface); color: var(--t2); font-size: 12px; cursor: pointer; }
.btn-trigger { font-size: 12px; color: var(--accent); background: none; border: none; cursor: pointer; font-weight: 400; padding: 8px 2px; font-family: inherit; }
.btn-trigger:hover { text-decoration: underline; }

/* Edit row */
.edit-row { display: flex; gap: 8px; flex: 1; align-items: center; flex-wrap: wrap; }
.edit-row input[type="text"] { flex: 1; min-width: 140px; padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border-s); font-size: 13px; outline: none; background: rgba(255,255,255,0.03); color: var(--t1); }
.edit-row input[type="text"]:focus { border-color: var(--accent); }
.edit-row input[type="date"] { padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border-s); font-size: 12px; font-family: 'JetBrains Mono', monospace; background: rgba(255,255,255,0.03); color: var(--t1); color-scheme: dark; }
[data-theme="light"] .edit-row input[type="date"] { color-scheme: light; }
.btn-save-sm { padding: 6px 12px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 12px; cursor: pointer; font-weight: 500; }
.deadline-changes-left { font-size: 9px; color: var(--t3); font-family: 'JetBrains Mono', monospace; }
.deadline-locked { font-size: 10px; color: var(--gold); display: inline-flex; align-items: center; gap: 2px; }
.deadline-history { display: flex; gap: 3px; align-items: center; }
.deadline-prev { font-size: 9px; color: var(--t3); text-decoration: line-through; font-family: 'JetBrains Mono', monospace; opacity: 0.6; }

/* Work notes */
.work-notes-area { width: 100%; min-height: 80px; padding: 10px; border-radius: 10px; border: 1px solid var(--border-s); font-size: 13px; line-height: 1.6; resize: vertical; outline: none; background: rgba(255,255,255,0.02); color: var(--t1); }
.work-notes-area:focus { border-color: var(--accent); }
.work-notes-display { font-size: 12px; color: var(--t2); line-height: 1.7; padding: 10px; background: rgba(255,255,255,0.015); border-radius: 10px; white-space: pre-wrap; }
[data-theme="light"] .work-notes-display { background: rgba(0,0,0,0.02); }
.btn-save-notes { padding: 6px 14px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 12px; cursor: pointer; font-weight: 500; }

/* File links */
.file-link-item { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
.file-link-remove { background: none; border: none; color: var(--t3); cursor: pointer; opacity: 0.3; font-size: 10px; }
.file-link-remove:hover { color: var(--persimmon); opacity: 1; }
.add-link-row { display: flex; gap: 5px; margin-top: 6px; }
.add-link-row input { flex: 1; padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border-s); font-size: 11px; background: rgba(255,255,255,0.02); color: var(--t1); outline: none; }
.add-link-row input:focus { border-color: var(--accent); }
.btn-add-link { padding: 7px 12px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 10px; cursor: pointer; font-weight: 500; }

/* Streak */
.streak-bar { display: flex; align-items: center; gap: 8px; padding: 12px 16px; background: var(--teal-bg); border-radius: var(--r); margin-top: 20px; }
.streak-text { font-size: 12px; color: var(--accent); }
.streak-dots { display: flex; gap: 4px; margin-left: auto; }
.streak-dot { width: 10px; height: 10px; border-radius: 50%; }
.streak-dot.on { background: var(--accent); }
.streak-dot.off { background: var(--border); }

/* Add bar */
.add-bar { background: var(--card); border-radius: var(--r); padding: 16px; border: 1px solid var(--accent); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.add-bar input[type="text"] { flex: 1; min-width: 180px; padding: 8px 12px; border-radius: var(--r-sm); border: 1px solid var(--border-s); font-size: 14px; outline: none; background: rgba(255,255,255,0.03); color: var(--t1); }
.add-bar input[type="text"]:focus { border-color: var(--accent); }
.add-bar select { padding: 8px 12px; border-radius: var(--r-sm); border: 1px solid var(--border-s); font-size: 13px; background: rgba(255,255,255,0.03); color: var(--t1); }

/* Save indicator */
.save-indicator { font-size: 11px; font-family: 'JetBrains Mono', monospace; padding: 3px 8px; border-radius: 6px; transition: opacity 0.4s; opacity: 0; font-weight: 500; }
.save-indicator.saved { color: var(--accent); background: var(--accent-bg); opacity: 1; }
.save-indicator.hidden { opacity: 0; }

/* Modals */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.modal { background: var(--card); border-radius: var(--r-lg); padding: 24px; max-width: 520px; width: 100%; }
.modal h3 { font-size: 18px; color: var(--t1); margin-bottom: 4px; font-weight: 600; letter-spacing: -0.3px; }
.modal .desc { font-size: 12px; color: var(--t2); line-height: 1.6; margin-bottom: 20px; }
.modal label { font-size: 10px; font-weight: 500; color: var(--t3); display: block; letter-spacing: 0.3px; }
.modal .url-row { display: flex; gap: 8px; margin-top: 6px; margin-bottom: 16px; }
.modal .url-row input { flex: 1; padding: 8px 12px; border-radius: var(--r-sm); border: 1px solid var(--border-s); font-size: 12px; font-family: 'JetBrains Mono', monospace; outline: none; background: rgba(255,255,255,0.03); color: var(--t1); }
.modal .url-row input:focus { border-color: var(--accent); }
.modal textarea { width: 100%; margin-top: 6px; padding: 8px 12px; border-radius: var(--r-sm); border: 1px solid var(--border-s); font-size: 12px; font-family: 'JetBrains Mono', monospace; resize: vertical; outline: none; background: rgba(255,255,255,0.03); color: var(--t1); }
.modal textarea:focus { border-color: var(--accent); }

.settings-field label { font-size: 10px; font-weight: 500; color: var(--t3); display: block; margin-bottom: 6px; letter-spacing: 0.3px; }

function daysUntil(dateStr) {
  if (!dateStr) return null;
  var today = new Date(todayStr());
  var target = new Date(dateStr);
  var diff = Math.ceil((target - today) / 86400000);
  return diff;
}

function daysLabel(n) {
  if (n === null) return "";

  if (n === 0) return "Today";

  return '<svg width="' + s + '" height="' + s + '" viewBox="0 0 ' + s + ' ' + s + '" style="transform:rotate(-90deg)">' +

    (pct > 0 ? '<circle cx="' + (s/2) + '" cy="' + (s/2) + '" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="3" stroke-dasharray="' + c.toFixed(1) + '" stroke-dashoffset="' + offset.toFixed(1) + '" stroke-linecap="round"/>' : '') +
  '</svg>';
}

function streakCount() {
  var now = new Date();
  var weekStart = new Date(now);
  weekStart.setDate(now.getDate() - now.getDay() + 1);
  var ws = weekStart.toISOString().split("T")[0];
  var count = 0;
  getList().forEach(function(t) {
    if (t.completed && t.endDate && t.endDate >= ws) count++;
  });
  return count;
}

function syncLogoSVG(w) {
  return '<svg width="'+w+'" height="'+w+'" viewBox="0 0 30 30" fill="none"><rect width="30" height="30" rx="10" fill="var(--sync-bg)"/><path d="M8 10H22M15 10V22" stroke="var(--sync-fg)" stroke-width="3" stroke-linecap="round"/><circle cx="15" cy="22" r="1.5" fill="var(--sync-fg)" opacity="0.7"/></svg>';
}

/* ——— SORTING ——— */
function sortTasks() {
  var sorter = function(a, b) {
    var pa = PRIO_WEIGHT[a.priority] !== undefined ? PRIO_WEIGHT[a.priority] : 1;
    var pb = PRIO_WEIGHT[b.priority] !== undefined ? PRIO_WEIGHT[b.priority] : 1;
    if (pa !== pb) return pa - pb;
    if (a.createdDate > b.createdDate) return -1;
    if (a.createdDate < b.createdDate) return 1;
    return 0;
  };
  state.tasks.sort(sorter);
  state.projects.sort(sorter);
}

function getList() { return state.activeTab === "projects" ? state.projects : state.tasks; }
function setList(arr) { if (state.activeTab === "projects") state.projects = arr; else state.tasks = arr; }
function findItem(id) { return getList().find(function(x) { return x.id === id; }); }

/* ——— PERSISTENCE ——— */
function loadCloudUrl() { try { state.cloudUrl = localStorage.getItem(CLOUD_URL_KEY) || ""; } catch {} }

function load() {
  loadCloudUrl();
  try {
    var d = localStorage.getItem(STORAGE_KEY);
    if (d) state.tasks = JSON.parse(d);
    var p = localStorage.getItem(PROJECTS_KEY);
    if (p) state.projects = JSON.parse(p);
    sortTasks();
  } catch (e) { console.error("Local load failed:", e); }
  if (state.cloudUrl) { cloudLoad(); } else { _cloudLoadDone = true; }
}

function saveLocal() {
  try {
    sortTasks();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.tasks));
    localStorage.setItem(PROJECTS_KEY, JSON.stringify(state.projects));
  } catch {}
}

var _saveHideTimer = null;
var _pendingSaveFlash = false;
var _cloudLoadDone = false;

function save() {
  saveLocal();
  _pendingSaveFlash = true;
  if (state.cloudUrl && _cloudLoadDone) cloudSave();
}

function flashSaveIndicator() {
  if (!_pendingSaveFlash) return;
  _pendingSaveFlash = false;
  var el = document.getElementById("saveIndicator");
  if (!el) return;
  el.className = "save-indicator saved";
  el.innerHTML = "\u2713 Saved";
  clearTimeout(_saveHideTimer);
  _saveHideTimer = setTimeout(function() {
    var e = document.getElementById("saveIndicator");
    if (e) { e.className = "save-indicator hidden"; setTimeout(function() { var e2 = document.getElementById("saveIndicator"); if (e2) { e2.className = "save-indicator"; e2.textContent = ""; } }, 400); }
  }, 1500);
}

/* ——— CLOUD SYNC ——— */
function updateSyncUI() {
  var s = state.syncStatus;
  var el = document.getElementById("syncStatus");
  if (el) el.className = "sidebar-brand " + s;
  var mob = document.getElementById("mobileSyncLogo");
  if (mob) mob.className = "mob-sync-logo " + s;
}

function cloudLoad() {
  if (!state.cloudUrl) return;
  state.syncStatus = "syncing"; updateSyncUI();
  fetch(state.cloudUrl).then(function(r) { return r.json(); }).then(function(data) {
    if (Array.isArray(data) && data.length > 0) {
      var cloudProjects = null;
      state.tasks = data.filter(function(item) {
        if (item && item._type === "projects") { cloudProjects = item.items || []; return false; }
        if (item && item._type === "quickNotes") return false;
        return true;
      });
      if (cloudProjects !== null) state.projects = cloudProjects;
      sortTasks(); saveLocal();
      _cloudLoadDone = true; render(true);
    } else if (Array.isArray(data) && data.length === 0 && state.tasks.length > 0) {
      _cloudLoadDone = true; cloudSave();
    } else { _cloudLoadDone = true; }
    state.syncStatus = "connected"; updateSyncUI();
  }).catch(function(e) {
    console.error("Cloud load failed:", e);
    _cloudLoadDone = true; state.syncStatus = "error"; updateSyncUI();
  });
}

function cloudSave() {
  if (!state.cloudUrl || !_cloudLoadDone) return;
  state.syncStatus = "syncing"; updateSyncUI();
  var payload = state.tasks.slice();
  payload.push({ _type: "projects", items: state.projects || [] });
  fetch(state.cloudUrl, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload), redirect: "follow" })
    .then(function() { state.syncStatus = "connected"; updateSyncUI(); })
    .catch(function(e) { console.error("Cloud save failed:", e); state.syncStatus = "error"; updateSyncUI(); });
}

function testCloudConnection(url, cb) {
  var ctrl = typeof AbortController !== "undefined" ? new AbortController() : null;
  var timer = setTimeout(function() { if (ctrl) ctrl.abort(); cb(false, "Connection timed out."); }, 10000);
  fetch(url, { redirect: "follow", signal: ctrl ? ctrl.signal : undefined })
    .then(function(r) { return r.json(); })
    .then(function(data) { clearTimeout(timer); cb(true, Array.isArray(data) ? "Connected! Found " + data.filter(function(d) { return !d._type; }).length + " tickets." : "Connected!"); })
    .catch(function(e) { clearTimeout(timer); if (e.name === "AbortError") return; cb(false, "Could not connect: " + e.message); });
}

window.addEventListener("beforeunload", function() {
  saveLocal();
  if (state.cloudUrl && navigator.sendBeacon && _cloudLoadDone) {
    var bp = state.tasks.slice();
    bp.push({_type:"projects",items:state.projects||[]});
    navigator.sendBeacon(state.cloudUrl, JSON.stringify(bp));
  }
});
document.addEventListener("visibilitychange", function() {
  if (document.visibilityState === "hidden") {
    saveLocal();
    if (state.cloudUrl && _cloudLoadDone) cloudSave();
  }
});

/* ——— DEADLINE HELPERS ——— */
function workingDaysUntil(deadlineStr) {
  var today = new Date(todayStr()); var deadline = new Date(deadlineStr);
  if (deadline < today) return -1;
  if (deadline.getTime() === today.getTime()) return 0;
  var count = 0; var d = new Date(today); d.setDate(d.getDate() + 1);
  while (d <= deadline) { var dow = d.getDay(); if (dow !== 0 && dow !== 6) count++; d.setDate(d.getDate() + 1); }
  return count;
}
function taskHasReminder(t) {
  if (t.completed) return false;
  return t.subtasks.some(function(s) { if (s.completed || !s.deadline) return false; var wd = workingDaysUntil(s.deadline); return wd >= 0 && wd <= 3; });
}
function subtaskReminderText(s) {
  if (s.completed || !s.deadline) return "";
  var wd = workingDaysUntil(s.deadline);
  if (wd < 0) return ""; if (wd === 0) return "Due today"; if (wd === 1) return "Due tomorrow";
  if (wd <= 3) return wd + " days left"; return "";
}

function getEarliestDeadline(t) {
  var earliest = null;
  t.subtasks.forEach(function(s) {
    if (!s.completed && s.deadline) {
      if (!earliest || s.deadline < earliest) earliest = s.deadline;
    }
  });
  return earliest;
}

/* ——— THEME ——— */
function loadTheme() {
  try {
    if (localStorage.getItem(THEME_KEY) === "light") { state.darkMode = false; document.documentElement.setAttribute("data-theme", "light"); }
    else { state.darkMode = true; document.documentElement.removeAttribute("data-theme"); }
  } catch(e) {}
}
function toggleTheme() {
  state.darkMode = !state.darkMode;
  if (state.darkMode) { document.documentElement.removeAttribute("data-theme"); try { localStorage.setItem(THEME_KEY, "dark"); } catch(e) {} }
  else { document.documentElement.setAttribute("data-theme", "light"); try { localStorage.setItem(THEME_KEY, "light"); } catch(e) {} }
  render();
}

/* ================================================================
   RENDER
   ================================================================ */
function render(force) {
  var list = getList();
  var today = todayStr();

  // Split into focus / up next / done
  var focusItems = [];
  var upNext = [];
  var done = [];

  list.forEach(function(t, idx) {
    t._ticketId = ticketId(list.length - idx);
    if (t.completed) { done.push(t); return; }
    var dl = getEarliestDeadline(t);
    var d = daysUntil(dl);
    t._deadline = dl;
    t._daysLeft = d;
    if (d !== null && d <= 3) focusItems.push(t);
    else upNext.push(t);
  });

  // Apply filters
  if (state.prioFilter !== "all") {
    upNext = upNext.filter(function(t) { return t.priority === state.prioFilter; });
  }

  document.getElementById("app").innerHTML =
    '<div class="page-wrap">' +
      renderSidebar() +
      '<div class="main-area">' +
        renderMobileTopBar() +
        (state.activeTab === "tasks" ? renderTicketsTab(focusItems, upNext, done) : renderComingSoon()) +
      '</div>' +
    '</div>' +
    renderMobileBar() +
    (state.showImport ? renderImportModal() : "") +
    (state.showSettings ? renderSettingsModal() : "");

  if (state.showAdd) setTimeout(function() { var el = document.getElementById("newTaskDesc"); if (el) el.focus(); }, 50);
  setTimeout(flashSaveIndicator, 20);
  setTimeout(updateSyncUI, 30);
}

      h += '</span>';
    }
    h += '</div>';

    // Expand/collapse detail
    var hasContent = s.workNotes || links.length > 0;
    if (hasContent || !s.completed) {
      if (isExpSub) {
        h += '<div class="sub-detail">';
        // Work notes
        h += '<div><div class="dt-label">Notes</div>';
        if (state.editingNotes === s.id) {
          h += '<textarea class="work-notes-area" id="workNotes_' + s.id + '" placeholder="Write notes...">' + esc(s.workNotes || "") + '</textarea>' +
            '<div style="margin-top:6px;display:flex;gap:6px"><button class="btn-save-notes" onclick="saveWorkNotes(\'' + t.id + '\',\'' + s.id + '\')">Save</button><button class="btn-outline" style="padding:5px 12px;font-size:11px" onclick="cancelEditNotes()">Cancel</button></div>';
        } else {
          if (s.workNotes) h += '<div class="dt-text">' + esc(s.workNotes) + '</div><button class="dt-edit" onclick="startEditNotes(\'' + s.id + '\')">Edit</button>';
          else h += '<button class="dt-edit" onclick="startEditNotes(\'' + s.id + '\')">+ Add notes</button>';
        }
        h += '</div>';
        // File links
        h += '<div><div class="dt-label">Files</div>';
        links.forEach(function(lk, idx) {
          var dn = lk.name || lk.url.replace(/https?:\/\//, "").slice(0, 40);
          h += '<div class="file-link-item"><a class="dt-file" href="' + esc(lk.url) + '" target="_blank" rel="noopener">' + icon("file", 10) + ' ' + esc(dn) + '</a><button class="file-link-remove" onclick="removeFileLink(\'' + t.id + '\',\'' + s.id + '\',' + idx + ')">\u00d7</button></div>';
        });
        h += '<div class="add-link-row"><input type="text" id="newLink_' + s.id + '" placeholder="Paste URL..." onkeydown="if(event.key===\'Enter\')addFileLink(\'' + t.id + '\',\'' + s.id + '\')"><button class="btn-add-link" onclick="addFileLink(\'' + t.id + '\',\'' + s.id + '\')">Add</button></div>';
        h += '</div></div>';
        h += '<button class="sub-toggle" onclick="toggleSubDetail(\'' + s.id + '\')"><span class="sub-arrow open"><svg width="9" height="9" viewBox="0 0 16 16" fill="none"><path d="M6 3.5L10.5 8L6 12.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Hide details</button>';
      } else {
        h += '<button class="sub-toggle" onclick="toggleSubDetail(\'' + s.id + '\')"><span class="sub-arrow"><svg width="9" height="9" viewBox="0 0 16 16" fill="none"><path d="M6 3.5L10.5 8L6 12.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Show details</button>';
      }
    }
    h += '</div><button class="sub-del" onclick="deleteSub(\'' + t.id + '\',\'' + s.id + '\')">\u00d7</button></div>';
  });

  // Add subtask
  if (state.addingSubTo === t.id) {
    h += '<div class="add-sub-row"><input type="text" id="newSubDesc" placeholder="Subtask description..." onkeydown="if(event.key===\'Enter\')addSubtask(\'' + t.id + '\')"><input class="agent-input" type="text" id="newSubAgent" maxlength="3" placeholder="AGT"><input type="date" id="newSubDead"><button class="btn-add" onclick="addSubtask(\'' + t.id + '\')">Add</button><button class="btn-cancel" onclick="cancelAddSub()">Cancel</button></div>';
  } else {
    h += '<button class="btn-trigger" onclick="startAddSub(\'' + t.id + '\')">+ Add subtask</button>';
  }
  h += '</div>';
  return h;
}

/* --- Coming soon --- */
function renderComingSoon() {
  var tab = TABS.find(function(t) { return t.id === state.activeTab; });
  if (!tab) return "";
  var h = '<div class="coming-soon"><h2>' + tab.label + '</h2><p>' + tab.desc + '</p>';
  if (tab.features) { h += '<div class="feature-list">'; tab.features.forEach(function(f) { h += '<div class="feature-item"><span class="feature-dot"></span>' + f + '</div>'; }); h += '</div>'; }
  return h + '</div>';
}

/* --- Import modal --- */
function renderImportModal() {
  return '<div class="modal-overlay" onclick="toggleImport()"><div class="modal" onclick="event.stopPropagation()">' +
    '<h3>Import tickets</h3><p class="desc">Paste CSV or Google Sheet URL.</p>' +
    '<label>Google Sheet CSV URL</label><div class="url-row"><input type="text" id="importUrl" placeholder="https://docs.google.com/..."><button class="btn-primary" onclick="fetchSheet()">Fetch</button></div>' +
    '<label>Or paste CSV text</label><textarea id="importCsv" rows="4" placeholder="Task,Priority,Subtask,Deadline"></textarea><button class="btn-primary" style="margin-top:8px" onclick="importCsvText()">Import</button>' +
    '<div id="importError"></div>' +
    '<div class="help"><p>Publish Google Sheet as CSV: File > Share > Publish to web > CSV</p></div></div></div>';
}

/* --- Settings modal --- */
function renderSettingsModal() {
  return '<div class="modal-overlay" onclick="toggleSettings()"><div class="settings-panel" onclick="event.stopPropagation()">' +
    '<h3>Settings</h3><p class="desc">Cloud sync and appearance.</p>' +
    '<div class="settings-field"><label>Cloud sync URL</label><input type="text" id="cloudUrlInput" value="' + esc(state.cloudUrl) + '" placeholder="https://script.google.com/macros/s/.../exec"></div>' +
    '<div class="settings-actions">' +
      '<button class="btn-primary" onclick="connectCloud()">Connect & sync</button>' +
      (state.cloudUrl ? '<button class="btn-outline" onclick="disconnectCloud()">Disconnect</button>' : '') +
      '<button class="btn-outline" onclick="forceCloudPush()">Push to cloud</button>' +
      '<button class="btn-outline" onclick="forceCloudPull()">Pull from cloud</button>' +
    '</div><div id="settingsResult"></div>' +
    '<div class="theme-row"><span class="theme-label">' + (state.darkMode ? "Dark mode" : "Light mode") + '</span><button class="theme-btn" onclick="toggleTheme()">' + (state.darkMode ? "Switch to light" : "Switch to dark") + '</button></div>' +
  '</div></div>';
}

/* ================================================================
   ACTION HANDLERS
   ================================================================ */
function setTab(id) { state.activeTab = id; render(); }
function setFilter(f) { state.filter = f; render(); }
function setPrioFilter(f) { state.prioFilter = f; render(); }
function toggleAdd() { state.showAdd = !state.showAdd; render(); }
function toggleImport() { state.showImport = !state.showImport; render(); }
function toggleExpand(id) { state.expandedTasks[id] = !state.expandedTasks[id]; render(); }
function toggleCompact(id) { state.compactSubtasks[id] = !state.compactSubtasks[id]; render(); }
function toggleSettings() { state.showSettings = !state.showSettings; render(); }

function addTask() {
  var desc = document.getElementById("newTaskDesc");
  var prio = document.getElementById("newTaskPrio");
  if (!desc || !desc.value.trim()) return;
  getList().unshift({ id: genId(), description: desc.value.trim(), priority: prio ? prio.value : "medium", createdDate: todayStr(), endDate: null, completed: false, subtasks: [] });
  state.showAdd = false;
  save(); render();
}
function deleteTask(id) {
  if (!confirm("Delete this ticket?")) return;
  setList(getList().filter(function(t) { return t.id !== id; }));
  save(); render();
}
function cyclePriority(id) {
  var t = findItem(id); if (!t) return;
  t.priority = PRIO_ORDER[(PRIO_ORDER.indexOf(t.priority) + 1) % 3];
  save(); render();
}
function startEditTitle(id) {
  var t = findItem(id); if (!t) return;
  var curr = document.querySelector(".ticket-title[ondblclick*=\"" + id + "\"]");
  if (!curr) return;
  var input = document.createElement("input");
  input.style.cssText = "font-size:14px;font-weight:500;border:1px solid var(--accent);border-radius:8px;padding:4px 8px;outline:none;flex:1;min-width:150px;background:var(--bg);color:var(--t1)";
  input.value = t.description;
  input.onkeydown = function(e) { if (e.key === "Enter") { t.description = input.value.trim() || t.description; save(); render(); } if (e.key === "Escape") render(); };
  input.onblur = function() { t.description = input.value.trim() || t.description; save(); render(); };
  curr.replaceWith(input); input.focus();
}

function toggleSub(taskId, subId) {
  var t = findItem(taskId); if (!t) return;
  var s = t.subtasks.find(function(x) { return x.id === subId; }); if (!s) return;
  s.completed = !s.completed; s.completedDate = s.completed ? todayStr() : null;
  recalcTask(t); save(); render();
}
function recalcTask(t) {
  var allDone = t.subtasks.length > 0 && t.subtasks.every(function(s) { return s.completed; });
  t.completed = allDone;
  t.endDate = allDone ? t.subtasks.reduce(function(latest, s) { return (!latest || s.completedDate > latest) ? s.completedDate : latest; }, null) : null;
}
function startEditSub(subId) { state.editingSubtask = subId; render(); }
function saveEditSub(taskId, subId) {
  var t = findItem(taskId); if (!t) return;
  var s = t.subtasks.find(function(x) { return x.id === subId; }); if (!s) return;
  var descEl = document.getElementById("editSubDesc_" + subId);
  var deadEl = document.getElementById("editSubDead_" + subId);
  var agentEl = document.getElementById("editSubAgent_" + subId);
  s.description = descEl ? (descEl.value.trim() || s.description) : s.description;
  s.agent = agentEl ? (agentEl.value.trim().toUpperCase().slice(0, 3) || null) : s.agent;
  if (!s.deadlineHistory) s.deadlineHistory = [];
  var newDl = deadEl ? (deadEl.value || null) : s.deadline;
  if (newDl !== s.deadline) {
    if (s.deadlineHistory.length >= 3) { alert("Maximum 3 deadline changes reached."); }
    else { if (s.deadline) s.deadlineHistory.push({ date: s.deadline, changedOn: todayStr() }); s.deadline = newDl; }
  }
  state.editingSubtask = null; save(); render();
}
function deleteSub(taskId, subId) {
  var t = findItem(taskId); if (!t) return;
  t.subtasks = t.subtasks.filter(function(s) { return s.id !== subId; });
  recalcTask(t); save(); render();
}
function startAddSub(taskId) { state.addingSubTo = taskId; render(); setTimeout(function() { var el = document.getElementById("newSubDesc"); if (el) el.focus(); }, 50); }
function cancelAddSub() { state.addingSubTo = null; render(); }
function addSubtask(taskId) {
  var descEl = document.getElementById("newSubDesc");
  if (!descEl || !descEl.value.trim()) return;
  var deadEl = document.getElementById("newSubDead");
  var agentEl = document.getElementById("newSubAgent");
  var t = findItem(taskId); if (!t) return;
  t.subtasks.push({ id: genId(), description: descEl.value.trim(), agent: agentEl ? (agentEl.value.trim().toUpperCase().slice(0, 3) || null) : null, deadline: deadEl ? (deadEl.value || null) : null, deadlineHistory: [], workNotes: "", links: [], completed: false, completedDate: null });
  t.completed = false; t.endDate = null;
  state.addingSubTo = null; save(); render();
}

function toggleSubDetail(subId) { state.expandedSubtasks[subId] = !state.expandedSubtasks[subId]; render(); }
function startEditNotes(subId) { state.editingNotes = subId; render(); setTimeout(function() { var el = document.getElementById("workNotes_" + subId); if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); } }, 50); }
function cancelEditNotes() { state.editingNotes = null; render(); }
function saveWorkNotes(taskId, subId) {
  var t = findItem(taskId); if (!t) return;
  var s = t.subtasks.find(function(x) { return x.id === subId; }); if (!s) return;
  var el = document.getElementById("workNotes_" + subId);
  s.workNotes = el ? el.value : (s.workNotes || ""); state.editingNotes = null; save(); render();
}
function addFileLink(taskId, subId) {
  var urlEl = document.getElementById("newLink_" + subId);
  if (!urlEl || !urlEl.value.trim()) return;
  var url = urlEl.value.trim();
  if (!/^https?:\/\//.test(url)) url = "https://" + url;
  var t = findItem(taskId); if (!t) return;
  var s = t.subtasks.find(function(x) { return x.id === subId; }); if (!s) return;
  if (!s.links) s.links = [];
  s.links.push({ url: url, name: null, addedOn: todayStr() }); save(); render();
}
function removeFileLink(taskId, subId, idx) {
  var t = findItem(taskId); if (!t) return;
  var s = t.subtasks.find(function(x) { return x.id === subId; }); if (!s || !s.links) return;
  s.links.splice(idx, 1); save(); render();
}

/* --- Settings actions --- */
function connectCloud() {
  var url = document.getElementById("cloudUrlInput").value.trim();
  var r = document.getElementById("settingsResult");
  if (!url) { if (r) r.innerHTML = '<div class="settings-status err">Please enter a URL.</div>'; return; }
  if (r) r.innerHTML = '<div class="settings-status" style="background:var(--accent-bg);color:var(--accent)">Testing connection...</div>';
  testCloudConnection(url, function(ok, msg) {
    var el = document.getElementById("settingsResult");
    if (ok) {
      state.cloudUrl = url; try { localStorage.setItem(CLOUD_URL_KEY, url); } catch(e) {}
      state.syncStatus = "connected";
      if (el) el.innerHTML = '<div class="settings-status ok">\u2713 ' + esc(msg) + '</div>';
      cloudLoad(); fetchMetalPricesFromCloud();
    } else { if (el) el.innerHTML = '<div class="settings-status err">\u2717 ' + esc(msg) + '</div>'; }
  });
}
function disconnectCloud() { state.cloudUrl = ""; state.syncStatus = "offline"; try { localStorage.removeItem(CLOUD_URL_KEY); } catch(e) {} render(); }
function forceCloudPush() {
  if (!state.cloudUrl) { alert("Connect first."); return; }
  cloudSave(); var el = document.getElementById("settingsResult");
  if (el) el.innerHTML = '<div class="settings-status ok">Pushing to cloud...</div>';
}
function forceCloudPull() {
  if (!state.cloudUrl) { alert("Connect first."); return; }
  var el = document.getElementById("settingsResult");
  if (el) el.innerHTML = '<div class="settings-status" style="background:var(--accent-bg);color:var(--accent)">Pulling from cloud...</div>';
  cloudLoad();
  setTimeout(function() { var e = document.getElementById("settingsResult"); if (e) e.innerHTML = '<div class="settings-status ok">Pulled ' + state.tasks.length + ' tickets.</div>'; }, 2000);
}

/* --- CSV --- */
function exportCsv() {
  var csv = "Task,Priority,Status,Created,Subtask,Agent,Deadline,Completed\n";
  getList().forEach(function(t) {
    if (t.subtasks.length === 0) csv += '"' + t.description + '",' + t.priority + ',' + (t.completed?"Done":"Active") + ',' + t.createdDate + ',,,,\n';
    else t.subtasks.forEach(function(s) { csv += '"' + t.description + '",' + t.priority + ',' + (t.completed?"Done":"Active") + ',' + t.createdDate + ',"' + s.description + '",' + (s.agent||"") + ',' + (s.deadline||"") + ',' + (s.completed?"Yes":"No") + '\n'; });
  });
  var blob = new Blob([csv], {type:"text/csv"});
  var a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "tickets_export.csv"; a.click();
}
function parseCsvText(text) {
  var lines = text.trim().split("\n").map(function(l) { var cells=[], cur="", inQ=false; for(var i=0;i<l.length;i++){var c=l[i];if(c==='"'){inQ=!inQ;continue;}if(c===','&&!inQ){cells.push(cur.trim());cur="";continue;}cur+=c;} cells.push(cur.trim()); return cells; });
  if (lines.length < 2) throw new Error("Need header + data rows."); return lines;
}
function importFromParsed(lines) {
  var headers = lines[0].map(function(h) { return h.toLowerCase(); });
  var descIdx = headers.findIndex(function(h) { return h.includes("task") || h.includes("description") || h.includes("title"); });
  var prioIdx = headers.findIndex(function(h) { return h.includes("priority"); });
  var subIdx = headers.findIndex(function(h) { return h.includes("subtask"); });
  var agentIdx = headers.findIndex(function(h) { return h.includes("agent"); });
  var deadIdx = headers.findIndex(function(h) { return h.includes("deadline") || h.includes("due"); });
  if (descIdx === -1) throw new Error("No Task/Description column found.");
  var taskMap = {};
  for (var i = 1; i < lines.length; i++) {
    var row = lines[i]; if (!row[descIdx]) continue;
    var name = row[descIdx];
    if (!taskMap[name]) {
      var p = prioIdx !== -1 ? (row[prioIdx]||"").toLowerCase() : "medium";
      taskMap[name] = { id: genId(), description: name, priority: p.includes("high")?"high":p.includes("low")?"low":"medium", createdDate: todayStr(), endDate: null, completed: false, subtasks: [] };
    }
    if (subIdx !== -1 && row[subIdx]) {
      taskMap[name].subtasks.push({ id: genId(), description: row[subIdx], agent: agentIdx !== -1 && row[agentIdx] ? row[agentIdx].trim().toUpperCase().slice(0,3) : null, deadline: deadIdx !== -1 && row[deadIdx] ? row[deadIdx] : null, deadlineHistory: [], workNotes: "", links: [], completed: false, completedDate: null });
    }
  }
  var tasks = Object.values(taskMap);
  if (tasks.length === 0) throw new Error("No tasks found.");
  if (state.activeTab === "projects") state.projects = tasks.concat(state.projects);
  else state.tasks = tasks.concat(state.tasks);
  state.showImport = false; save(); render();
}
function importCsvText() {
  var el = document.getElementById("importCsv"); var err = document.getElementById("importError");
  try { importFromParsed(parseCsvText(el.value)); } catch(e) { if (err) err.innerHTML = '<p class="error">' + esc(e.message) + '</p>'; }
}
function fetchSheet() {
  var url = document.getElementById("importUrl"); var err = document.getElementById("importError");
  if (!url || !url.value.trim()) return;
  fetch(url.value.trim()).then(function(r) { if (!r.ok) throw new Error("Could not fetch."); return r.text(); })
    .then(function(text) { importFromParsed(parseCsvText(text)); })
    .catch(function(e) { if (err) err.innerHTML = '<p class="error">' + esc(e.message) + '</p>'; });
}

/* ——— INIT ——— */
loadTheme();
load();
render();
fetchMetalPricesFromCloud();

</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#3d3f45">
<title>TaskaDo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #dfe1e7;
    --surface: #1a1b1e;
    --surface-solid: #ecedf2;
    --surface-hover: rgba(255,255,255,0.06);
    --surface-sec: rgba(0,0,0,0.04);
    --border: rgba(0,0,0,0.07);
    --border-s: rgba(0,0,0,0.11);
    --t1: #16171a;
    --t2: #5c5e66;
    --t3: #8b8d95;
    --accent: #e67e22;
    --accent-h: #d35400;
    --accent-bg: rgba(230,126,34,0.1);
    --blue: #3b82f6;
    --blue-bg: rgba(59,130,246,0.12);
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --orange: #f59e0b;
    --orange-bg: rgba(245,158,11,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.1);
    --warn: #dc2626;
    --warn-bg: rgba(220,38,38,0.1);
    --r: 10px;
    --r-lg: 14px;
    --r-sm: 7px;
    /* Header */
    --header-bg: #3d3f45;
    --header-t1: #ffffff;
    --header-t2: rgba(255,255,255,0.6);
    --header-border: rgba(255,255,255,0.1);
    /* Task layer */
    --task-bg: #ecedf2;
    --task-border: rgba(0,0,0,0.06);
    /* Subtask layer */
    --sub-panel: #d2d4da;
    --sub-card: #e0e2e8;
    --sub-border: rgba(0,0,0,0.05);
    --sub-accent: rgba(230,126,34,0.45);
    --detail-bg: #d8dae0;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); min-height: 100vh; color: var(--t1); -webkit-font-smoothing: antialiased; }
  input, select, textarea, button { font-family: inherit; }

  /* Header — dark professional bar */
  .header { background: var(--header-bg); padding: 0 32px; border-bottom: none; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
  .header-inner { max-width: 1400px; }
  .header-row { display: flex; align-items: center; min-height: 56px; gap: 16px; }
  .header-brand { display: flex; align-items: center; gap: 10px; margin-right: auto; flex-shrink: 0; }
  .header-brand svg { flex-shrink: 0; }
  .header h1 { font-size: 20px; color: var(--header-t1); font-weight: 800; letter-spacing: -0.3px; }
  .header .subtitle { font-size: 11px; color: var(--header-t2); font-weight: 400; }
  .header-center { display: flex; align-items: center; gap: 16px; }
  .today-bar { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--header-t2); font-weight: 500; }
  .header-btns { display: flex; gap: 6px; align-items: center; margin-left: auto; }

  .btn-outline { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--header-border); background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); font-size: 12px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
  .btn-outline:hover { background: rgba(255,255,255,0.16); color: #fff; }
  .btn-primary { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 6px; border: none; background: var(--accent); color: #fff; font-size: 12px; cursor: pointer; font-weight: 600; transition: all 0.15s; }
  .btn-primary:hover { background: var(--accent-h); }

  .save-indicator { font-size: 11px; font-family: 'JetBrains Mono', monospace; padding: 3px 8px; border-radius: 6px; transition: opacity 0.4s; opacity: 0; font-weight: 500; }
  .save-indicator.saving { color: var(--orange); background: rgba(255,159,10,0.15); opacity: 1; }
  .save-indicator.saved { color: var(--green); background: rgba(48,209,88,0.15); opacity: 1; }
  .save-indicator.error { color: var(--red); background: rgba(255,69,58,0.15); opacity: 1; }
  .save-indicator.hidden { opacity: 0; }

  /* Sync status */
  .sync-status { display: flex; align-items: center; gap: 4px; font-size: 10px; font-family: 'JetBrains Mono', monospace; font-weight: 500; padding: 3px 8px; border-radius: 6px; }
  .sync-status.connected { color: var(--green); background: rgba(48,209,88,0.15); }
  .sync-status.syncing { color: var(--accent); background: rgba(230,126,34,0.15); }
  .sync-status.offline { color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.06); }
  .sync-status.error { color: var(--red); background: rgba(255,69,58,0.15); }
  .sync-dot { width: 5px; height: 5px; border-radius: 50%; }
  .sync-dot.connected { background: var(--green); }
  .sync-dot.syncing { background: var(--accent); animation: pulse-sync 1s infinite; }
  .sync-dot.offline { background: rgba(255,255,255,0.35); }
  .sync-dot.error { background: var(--red); }
  @keyframes pulse-sync { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  .btn-icon { padding: 5px 7px; border-radius: 6px; border: 1px solid var(--header-border); background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); font-size: 14px; cursor: pointer; transition: all 0.15s; line-height: 1; }
  .btn-icon:hover { background: rgba(255,255,255,0.16); color: #fff; }

  /* Settings modal */
  .settings-panel { background: var(--surface-solid); border-radius: var(--r-lg); padding: 28px; max-width: 560px; width: 100%; box-shadow: var(--shadow-lg); }
  .settings-panel h3 { font-size: 20px; color: var(--t1); margin-bottom: 4px; font-weight: 700; letter-spacing: -0.3px; }
  .settings-panel .desc { font-size: 13px; color: var(--t2); line-height: 1.6; margin-bottom: 20px; }
  .settings-field { margin-bottom: 16px; }
  .settings-field label { font-size: 11px; font-weight: 600; color: var(--t2); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
  .settings-field input { width: 100%; padding: 10px 12px; border-radius: var(--r-sm); border: 1px solid var(--border-s); font-size: 13px; font-family: 'JetBrains Mono', monospace; outline: none; background: var(--bg); }
  .settings-field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(230,126,34,0.15); }
  .settings-actions { display: flex; gap: 8px; margin-top: 20px; }
  .settings-status { margin-top: 12px; padding: 10px 14px; border-radius: var(--r-sm); font-size: 13px; }
  .settings-status.ok { background: var(--green-bg); color: var(--green); }
  .settings-status.err { background: var(--red-bg); color: var(--red); }
  .settings-steps { margin-top: 20px; padding-top: 16px; border-top: 0.5px solid var(--border); }
  .settings-steps p { font-size: 12px; color: var(--t3); line-height: 1.7; }
  .settings-steps a { color: var(--accent); text-decoration: none; }
  .settings-steps a:hover { text-decoration: underline; }

  .stats { display: flex; gap: 24px; margin-top: 16px; flex-wrap: wrap; }
  .stat { display: flex; align-items: baseline; gap: 5px; }
  .stat-val { font-size: 24px; font-weight: 700; font-family: 'JetBrains Mono', monospace; letter-spacing: -0.5px; }
  .stat-label { font-size: 11px; color: var(--t3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }

  .container { max-width: 1400px; padding: 0 32px; }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; padding-top: 20px; }
  .filter-label { font-size: 11px; color: var(--t3); font-weight: 600; margin-right: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .filter-label.ml { margin-left: 16px; }
  .filter-btn { padding: 5px 14px; border-radius: 100px; border: none; background: var(--surface-sec); color: var(--t2); font-size: 13px; font-weight: 500; cursor: pointer; text-transform: capitalize; transition: all 0.15s; }
  .filter-btn:hover { background: rgba(0,0,0,0.06); }
  .filter-btn.active { background: var(--accent-bg); color: var(--accent); font-weight: 600; }
  .filter-btn.active-high { background: var(--red-bg); color: var(--red); font-weight: 600; }
  .filter-btn.active-medium { background: var(--orange-bg); color: var(--orange); font-weight: 600; }
  .filter-btn.active-low { background: var(--green-bg); color: var(--green); font-weight: 600; }

  .add-bar { background: var(--task-bg); border-radius: var(--r); padding: 16px; border: 1px solid var(--accent); display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 16px; box-shadow: 0 0 0 3px rgba(230,126,34,0.08); }
  .add-bar input[type="text"] { flex: 1; min-width: 180px; padding: 8px 12px; border-radius: var(--r-sm); border: 1px solid var(--border-s); font-size: 14px; outline: none; background: var(--bg); transition: all 0.15s; }
  .add-bar input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(230,126,34,0.15); background: var(--task-bg); }
  .add-bar select { padding: 8px 12px; border-radius: var(--r-sm); border: 1px solid var(--border-s); font-size: 13px; background: var(--bg); }
  .btn-create { padding: 8px 20px; border-radius: var(--r-sm); border: none; background: var(--accent); color: #fff; font-weight: 600; font-size: 13px; cursor: pointer; }
  .btn-create:hover { background: var(--accent-h); }
  .btn-cancel { padding: 8px 14px; border-radius: var(--r-sm); border: 1px solid var(--border-s); background: var(--surface-solid); font-size: 13px; cursor: pointer; color: var(--t2); }

  .task-list { display: flex; flex-direction: column; gap: 8px; padding: 16px 0 40px; }

  .task-card { background: var(--task-bg); border-radius: var(--r); overflow: hidden; border: 1px solid var(--task-border); box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: all 0.2s; }
  .task-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.09); border-color: rgba(0,0,0,0.1); }
  .task-card.done { opacity: 0.55; }
  .task-header { display: flex; align-items: center; gap: 12px; padding: 16px 18px; cursor: pointer; user-select: none; transition: background 0.1s; }
  .task-header:hover { background: rgba(0,0,0,0.015); }
  .arrow { font-size: 10px; color: var(--t3); flex-shrink: 0; transition: transform 0.2s; display: inline-block; }
  .arrow.open { transform: rotate(90deg); }
  .task-info { flex: 1; min-width: 0; }
  .task-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .task-title { font-size: 16px; font-weight: 700; color: var(--t1); letter-spacing: -0.2px; }
  .task-title.done { text-decoration: line-through; color: var(--t3); }
  .task-title-input { font-size: 15px; font-weight: 600; border: 1px solid var(--accent); border-radius: 6px; padding: 2px 8px; outline: none; flex: 1; min-width: 150px; background: var(--bg); box-shadow: 0 0 0 3px rgba(230,126,34,0.15); }

  .prio-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 600; cursor: pointer; letter-spacing: 0.2px; text-transform: uppercase; border: none; transition: all 0.15s; }
  .prio-badge.high { background: var(--red-bg); color: var(--red); }
  .prio-badge.medium { background: var(--orange-bg); color: var(--orange); }
  .prio-badge.low { background: var(--green-bg); color: var(--green); }
  .prio-badge:hover { filter: brightness(0.95); }
  .prio-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .prio-dot.high { background: var(--red); }
  .prio-dot.medium { background: var(--orange); }
  .prio-dot.low { background: var(--green); }

  .completed-badge { font-size: 11px; color: var(--green); font-weight: 600; background: var(--green-bg); padding: 2px 8px; border-radius: 100px; }
  .task-meta { display: flex; align-items: center; gap: 12px; margin-top: 5px; font-size: 12px; color: var(--t3); font-family: 'JetBrains Mono', monospace; flex-wrap: wrap; font-weight: 400; }
  .task-meta .green { color: var(--green); }

  .reminder-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; color: #fff; background: var(--warn); padding: 2px 8px; border-radius: 100px; animation: pulse-remind 2s ease-in-out infinite; }
  @keyframes pulse-remind { 0%,100% { opacity: 1; } 50% { opacity: 0.65; } }
  .sub-reminder { font-size: 11px; font-weight: 600; color: var(--warn); background: var(--warn-bg); padding: 1px 6px; border-radius: 100px; white-space: nowrap; }

  .progress-wrap { margin-top: 6px; max-width: 240px; display: flex; align-items: center; gap: 8px; }
  .progress-bar { flex: 1; height: 4px; border-radius: 2px; background: rgba(0,0,0,0.06); overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
  .progress-fill.in-progress { background: var(--orange); }
  .progress-fill.full { background: var(--green); }
  .progress-pct { font-size: 12px; font-weight: 600; font-family: 'JetBrains Mono', monospace; min-width: 32px; }
  .progress-pct.in-progress { color: var(--orange); }
  .progress-pct.full { color: var(--green); }

  .btn-delete-task { background: none; border: none; color: var(--t3); cursor: pointer; font-size: 18px; padding: 0 4px; line-height: 1; flex-shrink: 0; opacity: 0.3; transition: all 0.15s; }
  .btn-delete-task:hover { color: var(--red); opacity: 1; }

  /* Subtasks panel — visually distinct layer */
  .subtasks-panel { border-top: 1px solid rgba(0,0,0,0.06); padding: 14px 16px 16px 16px; background: var(--sub-panel); }
  .subtasks-label { font-size: 10px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px; padding-left: 2px; }
  .no-subtasks { font-size: 13px; color: var(--t3); font-style: italic; margin: 2px 0 6px 2px; }

  /* Subtask card — softer than task card */
  .sub-card { background: var(--sub-card); border: 1px solid var(--sub-border); border-left: 3px solid var(--sub-accent); border-radius: 8px; padding: 0; margin-bottom: 8px; transition: all 0.15s; overflow: hidden; }
  .sub-card:hover { border-color: rgba(0,0,0,0.08); border-left-color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.04); background: #fff; }
  .sub-card.done { opacity: 0.4; border-left-color: var(--green); }
  .sub-card.done:hover { opacity: 0.5; }

  /* Row 1: checkbox + title + delete */
  .sub-main { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px 0 14px; }
  .checkbox { width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; border: 1.5px solid rgba(0,0,0,0.15); background: transparent; margin-top: 1px; }
  .checkbox:hover { border-color: var(--accent); }
  .checkbox.checked { border: none; background: var(--accent); }
  .sub-title { flex: 1; font-size: 14px; font-weight: 500; color: var(--t1); cursor: pointer; line-height: 1.4; }
  .sub-title:hover { color: var(--accent); }
  .sub-title.done { text-decoration: line-through; color: var(--t3); }
  .btn-delete-sub { background: none; border: none; color: var(--t3); cursor: pointer; font-size: 16px; padding: 0; line-height: 1; opacity: 0; transition: all 0.15s; flex-shrink: 0; }
  .sub-card:hover .btn-delete-sub { opacity: 0.3; }
  .btn-delete-sub:hover { color: var(--red); opacity: 1 !important; }

  /* Row 2: meta chips */
  .sub-meta { display: flex; align-items: center; gap: 6px; padding: 6px 14px 0 44px; flex-wrap: wrap; }
  .agent-badge { display: inline-flex; align-items: center; justify-content: center; padding: 2px 7px; border-radius: 6px; font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.3px; color: var(--accent); background: var(--accent-bg); }
  .sub-deadline { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--t1); background: rgba(0,0,0,0.05); padding: 2px 8px; border-radius: 6px; }
  .sub-deadline.overdue { color: #fff; background: var(--red); font-weight: 600; }
  .sub-reminder { font-size: 11px; font-weight: 600; color: #fff; background: var(--warn); padding: 2px 8px; border-radius: 6px; white-space: nowrap; animation: pulse-remind 2s ease-in-out infinite; }
  .sub-completed-chip { font-size: 11px; color: var(--green); font-family: 'JetBrains Mono', monospace; background: var(--green-bg); padding: 2px 8px; border-radius: 6px; }
  .deadline-history { display: inline-flex; gap: 3px; align-items: center; }
  .deadline-prev { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--t3); text-decoration: line-through; white-space: nowrap; background: var(--surface-sec); padding: 1px 5px; border-radius: 4px; }
  .deadline-changes-left { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--t3); white-space: nowrap; }
  .deadline-locked { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: #ff6961; font-weight: 600; white-space: nowrap; }

  /* Row 3: preview strip (notes + links) */
  .sub-preview { display: flex; align-items: center; gap: 8px; padding: 8px 14px 12px 44px; flex-wrap: wrap; }
  .notes-preview { font-size: 12px; color: var(--t2); max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: var(--surface-solid); padding: 4px 10px; border-radius: 6px; border-left: 3px solid var(--accent); cursor: pointer; transition: all 0.15s; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .notes-preview:hover { background: var(--accent-bg); color: var(--t1); }
  .notes-empty-hint { font-size: 12px; color: var(--t3); cursor: pointer; padding: 4px 0; transition: color 0.15s; }
  .notes-empty-hint:hover { color: var(--accent); }
  .links-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--accent); background: var(--surface-solid); padding: 4px 10px; border-radius: 6px; cursor: pointer; transition: all 0.15s; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
  .links-chip:hover { background: var(--accent-bg); }

  /* Expanded detail panel */
  .sub-detail-body { padding: 0 14px 14px 44px; border-top: 1px solid var(--sub-border); margin-top: 4px; background: var(--detail-bg); }
  .detail-section { margin-top: 12px; }
  .detail-section-title { font-size: 10px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .work-notes-area { width: 100%; min-height: 80px; padding: 10px 12px; border-radius: var(--r-sm); border: 1px solid var(--border-s); font-size: 13px; font-family: 'Inter', sans-serif; outline: none; background: var(--surface-solid); resize: vertical; line-height: 1.6; color: var(--t1); }
  .work-notes-area:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(230,126,34,0.15); }
  .work-notes-display { font-size: 13px; color: var(--t1); line-height: 1.6; white-space: pre-wrap; word-break: break-word; background: var(--surface-solid); border-radius: var(--r-sm); padding: 10px 12px; border: 1px solid var(--sub-border); box-shadow: inset 0 1px 2px rgba(0,0,0,0.03); }
  .file-link-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
  .file-link-btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: var(--r-sm); font-size: 12px; font-weight: 500; color: var(--accent); background: var(--surface-solid); text-decoration: none; border: 1px solid rgba(0,122,255,0.2); cursor: pointer; transition: all 0.15s; max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-link-btn:hover { background: var(--accent-bg); border-color: var(--accent); }
  .file-link-remove { background: none; border: none; color: var(--t3); cursor: pointer; font-size: 14px; padding: 0 2px; opacity: 0.3; transition: all 0.15s; }
  .file-link-remove:hover { color: var(--red); opacity: 1; }
  .add-link-row { display: flex; gap: 6px; margin-top: 6px; align-items: center; flex-wrap: wrap; }
  .add-link-row input { flex: 1; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border-s); font-size: 12px; outline: none; background: var(--surface-solid); }
  .add-link-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(230,126,34,0.15); }
  .add-link-row input::placeholder { font-size: 11px; }
  .btn-add-link { padding: 6px 12px; border-radius: 6px; border: none; background: var(--accent); color: #fff; font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .btn-save-notes { padding: 6px 14px; border-radius: 6px; border: none; background: var(--accent); color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-save-notes:hover { background: var(--accent-h); }
  .sub-detail-actions { display: flex; gap: 8px; margin-top: 8px; align-items: center; }

  /* Edit row */
  .agent-input { width: 42px; padding: 3px 4px; border-radius: 6px; border: 1px solid var(--border-s); font-size: 11px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; text-align: center; outline: none; background: var(--bg); }
  .agent-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(230,126,34,0.15); }

  /* Add subtask row */
  .add-sub-row { display: flex; gap: 8px; margin-top: 4px; align-items: center; flex-wrap: wrap; }

/* ——— SORTING: Priority (high first), then creation date (newest first) ——— */
const PRIO_WEIGHT = { high: 0, medium: 1, low: 2 };
function sortTasks() {
  state.tasks.sort(function(a, b) {
    var pa = PRIO_WEIGHT[a.priority] !== undefined ? PRIO_WEIGHT[a.priority] : 1;
    var pb = PRIO_WEIGHT[b.priority] !== undefined ? PRIO_WEIGHT[b.priority] : 1;
    if (pa !== pb) return pa - pb;
    // Same priority — newest first
    if (a.createdDate > b.createdDate) return -1;
    if (a.createdDate < b.createdDate) return 1;
    return 0;
  });
}

/* ——— PERSISTENCE: localStorage + Cloud Sync ——— */
function loadCloudUrl() {
  try { state.cloudUrl = localStorage.getItem(CLOUD_URL_KEY) || ""; } catch {}
}

function load() {
  loadCloudUrl();
  // Load from localStorage first (instant)
  try {
    var d = localStorage.getItem(STORAGE_KEY);
    if (d) state.tasks = JSON.parse(d);
    sortTasks();
  } catch (e) { console.error("Local load failed:", e); }
  // Then try cloud
  if (state.cloudUrl) {
    cloudLoad();
  }
}

function saveLocal() {
  try {
    sortTasks();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.tasks));
  } catch {}
}

let _saveHideTimer = null;
let _pendingSaveFlash = false;
let _cloudSaveTimer = null;

function save() {
  saveLocal();
  _pendingSaveFlash = true;
  // Debounce cloud save (wait 800ms after last change)
  clearTimeout(_cloudSaveTimer);
  if (state.cloudUrl) {
    _cloudSaveTimer = setTimeout(cloudSave, 800);
  }
}

function flashSaveIndicator() {
  if (!_pendingSaveFlash) return;
  _pendingSaveFlash = false;
  var el = document.getElementById("saveIndicator");
  if (!el) return;
  el.className = "save-indicator saved";
  el.innerHTML = icon('check',12) + ' Saved';
  clearTimeout(_saveHideTimer);
  _saveHideTimer = setTimeout(function() {
    var el2 = document.getElementById("saveIndicator");
    if (el2) {
      el2.className = "save-indicator hidden";
      setTimeout(function() {
        var el3 = document.getElementById("saveIndicator");
        if (el3) { el3.className = "save-indicator"; el3.textContent = ""; }
      }, 400);
    }
  }, 1500);
}

/* ——— CLOUD SYNC ——— */
function updateSyncUI() {
  var el = document.getElementById("syncStatus");
  if (!el) return;
  var s = state.syncStatus;
  var dot = '<span class="sync-dot ' + s + '"></span>';
  if (s === "connected") { el.className = "sync-status connected"; el.innerHTML = dot + "Cloud synced"; }
  else if (s === "syncing") { el.className = "sync-status syncing"; el.innerHTML = dot + "Syncing\u2026"; }
  else if (s === "error") { el.className = "sync-status error"; el.innerHTML = dot + "Sync error"; }
  else { el.className = "sync-status offline"; el.innerHTML = dot + (state.cloudUrl ? "Offline" : "Local only"); }
}

function cloudLoad() {
  if (!state.cloudUrl) return;
  state.syncStatus = "syncing";
  updateSyncUI();
  fetch(state.cloudUrl)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (Array.isArray(data) && data.length > 0) {
        state.tasks = data;
        sortTasks();
        saveLocal(); // cache cloud data locally
        render();
      } else if (Array.isArray(data) && data.length === 0 && state.tasks.length > 0) {
        // Cloud is empty but we have local data — push local to cloud
        cloudSave();
      }
      state.syncStatus = "connected";
      updateSyncUI();
    })
    .catch(function(e) {
      console.error("Cloud load failed:", e);
      state.syncStatus = "error";
      updateSyncUI();
    });
}

function cloudSave() {
  if (!state.cloudUrl) return;
  state.syncStatus = "syncing";
  updateSyncUI();
  fetch(state.cloudUrl, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(state.tasks),
    redirect: "follow"
  })
    .then(function() {
      state.syncStatus = "connected";
      updateSyncUI();
    })
    .catch(function(e) {
      console.error("Cloud save failed:", e);
      state.syncStatus = "error";
      updateSyncUI();
    });
}

function testCloudConnection(url, callback) {
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (Array.isArray(data)) {
        callback(true, "Connected! Found " + data.length + " tasks in cloud.");
      } else {
        callback(true, "Connected! Cloud is ready.");
      }
    })
    .catch(function(e) {
      callback(false, "Could not connect: " + e.message);
    });
}

/* ——— 3 WORKING DAYS REMINDER ——— */
function workingDaysUntil(deadlineStr) {
  const today = new Date(todayStr());
  const deadline = new Date(deadlineStr);
  if (deadline < today) return -1;
  if (deadline.getTime() === today.getTime()) return 0;
  let count = 0;
  const d = new Date(today);
  d.setDate(d.getDate() + 1);
  while (d <= deadline) {
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) count++;
    d.setDate(d.getDate() + 1);
  }
  return count;
}

function taskHasReminder(t) {
  if (t.completed) return false;
  return t.subtasks.some(function(s) {
    if (s.completed || !s.deadline) return false;
    const wd = workingDaysUntil(s.deadline);
    return wd >= 0 && wd <= 3;
  });
}

function subtaskReminderText(s) {
  if (s.completed || !s.deadline) return "";
  const wd = workingDaysUntil(s.deadline);
  if (wd < 0) return "";
  if (wd === 0) return "Due today!";
  if (wd === 1) return "Due in 1 work day";
  if (wd <= 3) return "Due in " + wd + " work days";
  return "";
}

  var pClass = pct === 100 ? "full" : "in-progress";

  return '<div class="task-card ' + (isDone?'done':'') + '">' +
    '<div class="task-header" onclick="toggleExpand(\'' + t.id + '\')">' +

          '<div class="progress-bar"><div class="progress-fill ' + pClass + '" style="width:' + pct + '%"></div></div>' +

  t.subtasks.forEach(function(s) {
    var isOverdue = s.deadline && !s.completed && new Date(s.deadline) < new Date(today);
    var isEditing = state.editingSubtask === s.id;
    var reminder = subtaskReminderText(s);

    var changesLeft = 3 - history.length;

          '<input class="agent-input" type="text" id="editSubAgent_' + s.id + '" value="' + esc(s.agent||'') + '" maxlength="3" placeholder="AGT" title="Responsible (max 3 letters)">' +
          '<input type="date" id="editSubDead_' + s.id + '" value="' + (s.deadline||'') + '"' + (isLocked ? ' disabled title="No more deadline changes allowed"' : '') + '>' +
          (isLocked ? '<span class="deadline-locked">' + icon('lock',11) + ' Locked</span>' : '<span class="deadline-changes-left">' + changesLeft + '/3 left</span>') +
          '<button class="btn-save-sm" onclick="saveEditSub(\'' + t.id + '\',\'' + s.id + '\')">Save</button>' +
        '</div>' +
      '</div></div>';
      return;
    }

    // --- CARD LAYOUT ---
    html += '<div class="sub-card ' + (s.completed?'done':'') + (isCompact?' compact':'') + '">';

    // ROW 1: Checkbox + Title + Delete
    html += '<div class="sub-main">';
    html += '<button class="checkbox ' + (s.completed?'checked':'') + '" onclick="toggleSub(\'' + t.id + '\',\'' + s.id + '\')">' +
      (s.completed ? '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6L5 8.5L9.5 3.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>' : '') +
    '</button>';
    html += '<span class="sub-title ' + (s.completed?'done':'') + '" onclick="startEditSub(\'' + s.id + '\')">' + esc(s.description) + '</span>';
    html += '<button class="btn-delete-sub" onclick="deleteSub(\'' + t.id + '\',\'' + s.id + '\')" title="Delete subtask">' + icon('close',12) + '</button>';
    // Compact-mode inline info
    var cDot = s.completed ? 'done' : (isOverdue ? 'overdue' : (reminder ? 'warn' : 'ok'));
    html += '<span class="sub-compact-info">';
    if (s.agent) html += '<span class="agent-badge" style="font-size:9px;padding:1px 5px">' + esc(s.agent) + '</span>';
    html += '<span class="sub-compact-dot ' + cDot + '"></span>';
    if (s.deadline && !s.completed) html += '<span class="sub-compact-date">' + fmtDate(s.deadline) + '</span>';
    if (s.completed) html += '<span class="sub-compact-date" style="color:var(--green)">' + icon('check',9) + '</span>';
    html += '</span>';
    html += '</div>';

    // ROW 2: Meta chips (agent, deadline, reminder, status)
    html += '<div class="sub-meta">';
    if (s.agent) html += '<span class="agent-badge">' + esc(s.agent) + '</span>';
    if (s.deadline) {
      html += '<span class="sub-deadline ' + (isOverdue?'overdue':'') + '">' +
        (isOverdue ? icon('warn',11)+' ' : icon('calendar',11)+' ') + fmtDate(s.deadline) + '</span>';
    }
    if (reminder) html += '<span class="sub-reminder">' + icon('clock',11) + ' ' + reminder + '</span>';
    if (history.length > 0) {
      html += '<span class="deadline-history">';
      history.forEach(function(h) {
        html += '<span class="deadline-prev">' + fmtDate(h.date) + '</span>';
      });
      html += '</span>';
      if (!isLocked) html += '<span class="deadline-changes-left">' + changesLeft + '/3</span>';
      else html += '<span class="deadline-locked">' + icon('lock',11) + '</span>';
    }
    if (s.completed && s.completedDate) html += '<span class="sub-completed-chip">' + icon('check',11) + ' ' + fmtDate(s.completedDate) + '</span>';
    html += '</div>';

    // ROW 3: Preview strip (notes snippet + link count)
    html += '<div class="sub-preview">';
    if (s.workNotes) {
      var preview = s.workNotes.split('\n')[0].slice(0, 80);
      if (s.workNotes.length > 80) preview += '\u2026';
      html += '<span class="notes-preview" onclick="toggleSubDetail(\'' + s.id + '\')">' + esc(preview) + '</span>';
    } else {
      html += '<span class="notes-empty-hint" onclick="state.expandedSubtasks[\'' + s.id + '\']=true;state.editingNotes=\'' + s.id + '\';render();">+ Add notes</span>';
    }
    if (links.length > 0) {
      html += '<span class="links-chip" onclick="toggleSubDetail(\'' + s.id + '\')">' + icon('link',11) + ' ' + links.length + ' file' + (links.length > 1 ? 's' : '') + '</span>';
    }
    html += '</div>';

    // EXPANDED DETAIL (notes full + file links)
    if (isExpSub) {
      html += '<div class="sub-detail-body">';

      // Notes section
      html += '<div class="detail-section">';
      html += '<div class="detail-section-title">' + icon('note',13) + ' Work Notes</div>';
      if (state.editingNotes === s.id) {
        html += '<textarea class="work-notes-area" id="workNotes_' + s.id + '" placeholder="Describe what was done...">' + esc(s.workNotes || '') + '</textarea>';
        html += '<div class="sub-detail-actions">';
        html += '<button class="btn-save-notes" onclick="saveWorkNotes(\'' + t.id + '\',\'' + s.id + '\')">Save Notes</button>';
        html += '<button class="btn-outline" style="padding:5px 12px;font-size:12px" onclick="cancelEditNotes()">Cancel</button>';
        html += '</div>';
      } else {
        if (s.workNotes) {
          html += '<div class="work-notes-display">' + esc(s.workNotes) + '</div>';
          html += '<button style="margin-top:6px;font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:500" onclick="startEditNotes(\'' + s.id + '\')">\u270F Edit notes</button>';
        } else {
          html += '<button style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:500" onclick="startEditNotes(\'' + s.id + '\')">+ Write notes</button>';
        }
      }
      html += '</div>';

      // File links section
      html += '<div class="detail-section">';
      html += '<div class="detail-section-title">' + icon('link',13) + ' File Links <span style="font-weight:400;font-size:10px;color:var(--t3);text-transform:none">(Google Drive, Dropbox, etc.)</span></div>';
      links.forEach(function(link, idx) {
        var displayName = link.name || link.url.replace(/https?:\/\//, "").slice(0, 45);
        html += '<div class="file-link-item">';
        html += '<a class="file-link-btn" href="' + esc(link.url) + '" target="_blank" rel="noopener">' + icon('file',12) + ' ' + esc(displayName) + '</a>';
        html += '<button class="file-link-remove" onclick="removeFileLink(\'' + t.id + '\',\'' + s.id + '\',' + idx + ')" title="Remove">' + icon('close',11) + '</button>';
        html += '</div>';
      });
      html += '<div class="add-link-row">';
      html += '<input type="text" id="newLink_' + s.id + '" placeholder="Paste file URL..." onkeydown="if(event.key===\'Enter\')addFileLink(\'' + t.id + '\',\'' + s.id + '\')">';
      html += '<input type="text" id="newLinkName_' + s.id + '" placeholder="Label (optional)" style="max-width:120px" onkeydown="if(event.key===\'Enter\')addFileLink(\'' + t.id + '\',\'' + s.id + '\')">';
      html += '<button class="btn-add-link" onclick="addFileLink(\'' + t.id + '\',\'' + s.id + '\')">Add</button>';
      html += '</div>';
      html += '</div>';

      html += '</div>'; // sub-detail-body
    }

    html += '</div>'; // sub-card
  });

  if (state.addingSubTo === t.id) {
    html += '<div class="add-sub-row">' +
      '<input type="text" id="newSubDesc" placeholder="Subtask description..." onkeydown="if(event.key===\'Enter\')addSubtask(\'' + t.id + '\')">' +
      '<input class="agent-input" type="text" id="newSubAgent" maxlength="3" placeholder="AGT" title="Responsible (max 3 letters)">' +
      '<input type="date" id="newSubDead">' +
      '<button class="btn-add-sub" onclick="addSubtask(\'' + t.id + '\')">Add</button>' +
      '<button class="btn-add-sub-cancel" onclick="cancelAddSub()">Cancel</button>' +
    '</div>';
  } else {
    html += '<button class="btn-add-sub-trigger" onclick="startAddSub(\'' + t.id + '\')">+ Add subtask</button>';
  }

  html += '</div>';
  return html;
}

/* ——— SETTINGS ACTIONS ——— */
function toggleSettings() { state.showSettings = !state.showSettings; render(); }

function connectCloud() {
  var url = document.getElementById("cloudUrlInput").value.trim();
  var resultEl = document.getElementById("settingsResult");
  if (!url) {
    if (resultEl) resultEl.innerHTML = '<div class="settings-status err">Please enter a URL.</div>';
    return;
  }
  if (resultEl) resultEl.innerHTML = '<div class="settings-status" style="background:var(--accent-bg);color:var(--accent)">Testing connection\u2026</div>';

  testCloudConnection(url, function(ok, msg) {
    var el = document.getElementById("settingsResult");
    if (ok) {
      state.cloudUrl = url;
      try { localStorage.setItem(CLOUD_URL_KEY, url); } catch {}
      state.syncStatus = "connected";
      if (el) el.innerHTML = '<div class="settings-status ok">\u2713 ' + esc(msg) + '</div>';
      // Sync: load from cloud
      cloudLoad();
    } else {
      if (el) el.innerHTML = '<div class="settings-status err">\u2717 ' + esc(msg) + '</div>';
    }
  });
}

function disconnectCloud() {
  state.cloudUrl = "";
  state.syncStatus = "offline";
  try { localStorage.removeItem(CLOUD_URL_KEY); } catch {}
  render();
}

function forceCloudPush() {
  if (!state.cloudUrl) { alert("Connect to cloud first."); return; }
  cloudSave();
  var el = document.getElementById("settingsResult");
  if (el) el.innerHTML = '<div class="settings-status ok">Pushing ' + state.tasks.length + ' tasks to cloud\u2026</div>';
}

function forceCloudPull() {
  if (!state.cloudUrl) { alert("Connect to cloud first."); return; }
  var el = document.getElementById("settingsResult");
  if (el) el.innerHTML = '<div class="settings-status" style="background:var(--accent-bg);color:var(--accent)">Pulling from cloud\u2026</div>';
  cloudLoad();
  setTimeout(function() {
    var el2 = document.getElementById("settingsResult");
    if (el2) el2.innerHTML = '<div class="settings-status ok">Pulled ' + state.tasks.length + ' tasks from cloud.</div>';
  }, 2000);
}


/* ——— SUBTASK DETAIL ACTIONS ——— */
function toggleSubDetail(subId) {
  state.expandedSubtasks[subId] = !state.expandedSubtasks[subId];
  render();
}

function startEditNotes(subId) {
  state.editingNotes = subId;
  render();
  setTimeout(function() {
    var el = document.getElementById("workNotes_" + subId);
    if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
  }, 50);
}

function cancelEditNotes() {
  state.editingNotes = null;
  render();
}

function saveWorkNotes(taskId, subId) {
  var t = state.tasks.find(function(x){ return x.id === taskId; });
  if (!t) return;
  var s = t.subtasks.find(function(x){ return x.id === subId; });
  if (!s) return;
  var el = document.getElementById("workNotes_" + subId);
  s.workNotes = el ? el.value : (s.workNotes || '');
  state.editingNotes = null;
  save(); render();
}

function addFileLink(taskId, subId) {
  var urlEl = document.getElementById("newLink_" + subId);
  var nameEl = document.getElementById("newLinkName_" + subId);
  if (!urlEl || !urlEl.value.trim()) return;
  var url = urlEl.value.trim();
  // Auto-add https if missing
  if (!/^https?:\/\//.test(url)) url = 'https://' + url;
  var name = nameEl ? nameEl.value.trim() : '';

  var t = state.tasks.find(function(x){ return x.id === taskId; });
  if (!t) return;
  var s = t.subtasks.find(function(x){ return x.id === subId; });
  if (!s) return;
  if (!s.links) s.links = [];
  s.links.push({ url: url, name: name || null, addedOn: todayStr() });
  save(); render();
}

function removeFileLink(taskId, subId, idx) {
  var t = state.tasks.find(function(x){ return x.id === taskId; });
  if (!t) return;
  var s = t.subtasks.find(function(x){ return x.id === subId; });
  if (!s || !s.links) return;
  s.links.splice(idx, 1);
  save(); render();
}

function toggleCompact(taskId) {
  state.compactSubtasks[taskId] = !state.compactSubtasks[taskId];
  render();
}

/* ——— ACTIONS ——— */
function setTab(id) { state.activeTab = id; render(); }
function setFilter(f) { state.filter = f; render(); }
function setPrioFilter(f) { state.prioFilter = f; render(); }
function toggleAdd() { state.showAdd = !state.showAdd; render(); }
function toggleImport() { state.showImport = !state.showImport; render(); }
function toggleExpand(id) { state.expandedTasks[id] = !state.expandedTasks[id]; render(); }

function addTask() {
  var desc = document.getElementById("newTaskDesc");
  var prio = document.getElementById("newTaskPrio");
  if (!desc || !desc.value.trim()) return;
  state.tasks.unshift({ id: genId(), description: desc.value.trim(), priority: prio ? prio.value : "medium", createdDate: todayStr(), endDate: null, completed: false, subtasks: [] });
  state.showAdd = false;
  save(); render();
}

function deleteTask(id) {
  if (!confirm("Delete this task?")) return;
  state.tasks = state.tasks.filter(function(t){ return t.id !== id; });
  save(); render();
}

function cyclePriority(id) {
  var t = state.tasks.find(function(x){ return x.id === id; });
  if (!t) return;
  t.priority = PRIO_ORDER[(PRIO_ORDER.indexOf(t.priority)+1) % 3];
  save(); render();
}

function startEditTitle(id) {
  var t = state.tasks.find(function(x){ return x.id === id; });
  if (!t) return;
  var curr = document.querySelector('.task-card .task-title[ondblclick*="' + id + '"]');
  if (!curr) return;
  var input = document.createElement("input");
  input.className = "task-title-input";
  input.value = t.description;
  input.onkeydown = function(e) {
    if (e.key === "Enter") { t.description = input.value.trim() || t.description; save(); render(); }
    if (e.key === "Escape") render();
  };
  input.onblur = function() { t.description = input.value.trim() || t.description; save(); render(); };
  curr.replaceWith(input);
  input.focus();
}

function toggleSub(taskId, subId) {
  var t = state.tasks.find(function(x){ return x.id === taskId; });
  if (!t) return;
  var s = t.subtasks.find(function(x){ return x.id === subId; });
  if (!s) return;
  s.completed = !s.completed;
  s.completedDate = s.completed ? todayStr() : null;
  recalcTask(t);
  save(); render();
}

function recalcTask(t) {
  var allDone = t.subtasks.length > 0 && t.subtasks.every(function(s){ return s.completed; });
  t.completed = allDone;
  t.endDate = allDone ? t.subtasks.reduce(function(latest, s){ return (!latest || s.completedDate > latest) ? s.completedDate : latest; }, null) : null;
}

function startEditSub(subId) { state.editingSubtask = subId; render(); }
function saveEditSub(taskId, subId) {
  var t = state.tasks.find(function(x){ return x.id === taskId; });
  if (!t) return;
  var s = t.subtasks.find(function(x){ return x.id === subId; });
  if (!s) return;
  var descEl = document.getElementById("editSubDesc_" + subId);
  var deadEl = document.getElementById("editSubDead_" + subId);
  var agentEl = document.getElementById("editSubAgent_" + subId);
  s.description = descEl ? (descEl.value.trim() || s.description) : s.description;
  s.agent = agentEl ? (agentEl.value.trim().toUpperCase().slice(0,3) || null) : s.agent;

  // Deadline change tracking (max 3 changes)
  if (!s.deadlineHistory) s.deadlineHistory = [];
  var newDeadline = deadEl ? (deadEl.value || null) : s.deadline;
  if (newDeadline !== s.deadline) {
    if (s.deadlineHistory.length >= 3) {
      alert("Maximum 3 deadline changes reached for this subtask.");
    } else {
      if (s.deadline) {
        s.deadlineHistory.push({ date: s.deadline, changedOn: todayStr() });
      }
      s.deadline = newDeadline;
    }
  }

  state.editingSubtask = null;
  save(); render();
}

function deleteSub(taskId, subId) {
  var t = state.tasks.find(function(x){ return x.id === taskId; });
  if (!t) return;
  t.subtasks = t.subtasks.filter(function(s){ return s.id !== subId; });
  recalcTask(t);
  save(); render();
}

function startAddSub(taskId) { state.addingSubTo = taskId; render(); setTimeout(function(){ var el = document.getElementById("newSubDesc"); if (el) el.focus(); }, 50); }
function cancelAddSub() { state.addingSubTo = null; render(); }
function addSubtask(taskId) {
  var descEl = document.getElementById("newSubDesc");
  if (!descEl || !descEl.value.trim()) return;
  var deadEl = document.getElementById("newSubDead");
  var agentEl = document.getElementById("newSubAgent");
  var t = state.tasks.find(function(x){ return x.id === taskId; });
  if (!t) return;
  var agentVal = agentEl ? agentEl.value.trim().toUpperCase().slice(0,3) : null;
  t.subtasks.push({ id: genId(), description: descEl.value.trim(), agent: agentVal || null, deadline: deadEl ? (deadEl.value || null) : null, deadlineHistory: [], workNotes: '', links: [], completed: false, completedDate: null });
  t.completed = false;
  t.endDate = null;
  state.addingSubTo = null;
  save(); render();
}

function exportCsv() {
  var csv = "Task,Priority,Status,Created,End Date,Subtask,Agent,Subtask Deadline,Subtask Completed\n";
  state.tasks.forEach(function(t) {
    if (t.subtasks.length === 0) {
      csv += '"' + t.description + '",' + t.priority + ',' + (t.completed?"Done":"Active") + ',' + t.createdDate + ',' + (t.endDate||"") + ',,,,\n';
    } else {
      t.subtasks.forEach(function(s) {
        csv += '"' + t.description + '",' + t.priority + ',' + (t.completed?"Done":"Active") + ',' + t.createdDate + ',' + (t.endDate||"") + ',"' + s.description + '",' + (s.agent||"") + ',' + (s.deadline||"") + ',' + (s.completed?"Yes":"No") + '\n';
      });
    }
  });
  var blob = new Blob([csv], {type:"text/csv"});
  var a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "tasks_export.csv"; a.click();
}

function parseCsvText(text) {
  var lines = text.trim().split("\n").map(function(l) {
    var cells = [], cur = "", inQ = false;
    for (var i = 0; i < l.length; i++) {
      var c = l[i];
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { cells.push(cur.trim()); cur = ""; continue; }
      cur += c;
    }
    cells.push(cur.trim());
    return cells;
  });
  if (lines.length < 2) throw new Error("CSV must have a header row and at least one data row.");
  return lines;
}

function importFromParsed(lines) {
  var headers = lines[0].map(function(h){ return h.toLowerCase(); });
  var descIdx = headers.findIndex(function(h){ return h.includes("task") || h.includes("description") || h.includes("title"); });
  var prioIdx = headers.findIndex(function(h){ return h.includes("priority") || h.includes("prio"); });
  var subIdx = headers.findIndex(function(h){ return h.includes("subtask"); });
  var agentIdx = headers.findIndex(function(h){ return h.includes("agent") || h.includes("responsible") || h.includes("owner"); });
  var deadIdx = headers.findIndex(function(h){ return h.includes("deadline") || h.includes("due") || h.includes("date"); });
  if (descIdx === -1) throw new Error("Could not find a 'Task' or 'Description' column.");

  var taskMap = {};
  for (var i = 1; i < lines.length; i++) {
    var row = lines[i];
    if (!row[descIdx]) continue;
    var name = row[descIdx];
    if (!taskMap[name]) {
      var p = prioIdx !== -1 ? (row[prioIdx]||"").toLowerCase() : "medium";
      var priority = p.includes("high") ? "high" : p.includes("low") ? "low" : "medium";
      taskMap[name] = { id: genId(), description: name, priority: priority, createdDate: todayStr(), endDate: null, completed: false, subtasks: [] };
    }
    if (subIdx !== -1 && row[subIdx]) {
      var agentVal = agentIdx !== -1 && row[agentIdx] ? row[agentIdx].trim().toUpperCase().slice(0,3) : null;
      taskMap[name].subtasks.push({ id: genId(), description: row[subIdx], agent: agentVal, deadline: deadIdx !== -1 && row[deadIdx] ? row[deadIdx] : null, deadlineHistory: [], completed: false, completedDate: null });
    }
  }
  var tasks = Object.values(taskMap);
  if (tasks.length === 0) throw new Error("No tasks found in CSV.");
  state.tasks = tasks.concat(state.tasks);
  state.showImport = false;
  save(); render();
}

function importCsvText() {
  var el = document.getElementById("importCsv");
  var errEl = document.getElementById("importError");
  try {
    var lines = parseCsvText(el.value);
    importFromParsed(lines);
  } catch (e) { if (errEl) errEl.innerHTML = '<p class="error">' + esc(e.message) + '</p>'; }
}

function fetchSheet() {
  var url = document.getElementById("importUrl");
  var errEl = document.getElementById("importError");
  if (!url || !url.value.trim()) return;
  fetch(url.value.trim())
    .then(function(resp) {
      if (!resp.ok) throw new Error("Could not fetch. Make sure it's a published Google Sheet CSV link.");
      return resp.text();
    })
    .then(function(text) {
      var lines = parseCsvText(text);
      importFromParsed(lines);
    })
    .catch(function(e) {
      if (errEl) errEl.innerHTML = '<p class="error">' + esc(e.message) + '</p>';
    });
}

/* ——— INIT ——— */
load();
render();
</script>
</body>
